name: Android CI - Tests & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests with Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --stacktrace
      
    - name: Generate Coverage Report
      run: ./gradlew jacocoTestReport
      
    - name: Verify Coverage Thresholds
      run: ./gradlew jacocoCoverageVerification
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/reports/tests/
        
    - name: Upload Coverage Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: app/build/reports/jacoco/
        
    - name: Comment Test Results on PR
      if: github.event_name == 'pull_request'
      uses: dorny/test-reporter@v1
      with:
        name: Test Results
        path: 'app/build/test-results/testDebugUnitTest/*.xml'
        reporter: java-junit
        fail-on-error: false

  lint:
    name: Run Lint Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run Lint
      run: ./gradlew lintDebug
      
    - name: Upload Lint Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: app/build/reports/lint-results-debug.html

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk

  instrumented-test:
    name: Run Instrumented Tests
    runs-on: macos-latest
    strategy:
      matrix:
        api-level: [29, 30]
        shard-index: [0, 1]
      max-parallel: 4
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Create Android Virtual Device
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ matrix.api-level }}
        arch: x86
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-snapshot-save
        target: default
        script: echo "Emulator started"
        
    - name: Run instrumented tests with sharding
      run: |
        ./gradlew connectedDebugAndroidTest \
          -Pandroid.testInstrumentationRunnerArguments.numShards=2 \
          -Pandroid.testInstrumentationRunnerArguments.shardIndex=${{ matrix.shard-index }} \
          --continue
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-instrumented-${{ matrix.api-level }}-${{ matrix.shard-index }}
        path: app/build/outputs/androidTest-results/
        
    - name: Upload coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-instrumented-${{ matrix.api-level }}-${{ matrix.shard-index }}
        path: app/build/outputs/code_coverage/

