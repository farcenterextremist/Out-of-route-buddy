build:
  # maxIssues allows build to pass while addressing issues incrementally (baseline: ~1600)
  maxIssues: 2000
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

style:
  active: true

complexity:
  active: true

comments:
  active: true 